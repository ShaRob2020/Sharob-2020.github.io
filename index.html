<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shaun Bass</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111;
      --gray: #555;
      --light: #f5f5f3;
      --accent: #2a2a2a;
      --border: #ddd;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fff;
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      padding: 2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    nav .logo {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
    }

    nav .nav-link {
      font-size: 0.875rem;
      color: var(--gray);
      text-decoration: none;
      letter-spacing: 0.03em;
    }

    nav .nav-link:hover { color: var(--black); }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 6rem 2.5rem 4rem;
      max-width: 720px;
    }

    .hero .eyebrow {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gray);
      margin-bottom: 1.25rem;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    .hero p {
      font-size: 1.05rem;
      color: var(--gray);
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 2.5rem;
    }

    /* ── CONTACT FORM ── */
    .form-section {
      background: var(--light);
      padding: 4rem 2.5rem;
    }

    .form-inner {
      max-width: 520px;
    }

    .form-section h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .form-section .sub {
      font-size: 0.9rem;
      color: var(--gray);
      margin-bottom: 2rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-grid .full { grid-column: 1 / -1; }

    label {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 0.4rem;
    }

    input, textarea, select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #fff;
      color: var(--black);
      transition: border-color 0.15s;
      appearance: none;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--black);
    }

    textarea { resize: vertical; min-height: 120px; }

    .btn {
      display: inline-block;
      margin-top: 1.25rem;
      padding: 0.85rem 2rem;
      background: var(--black);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover { background: #333; }

    /* ── FOOTER ── */
    footer {
      padding: 2rem 2.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--gray);
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    footer a { color: var(--gray); text-decoration: none; }
    footer a:hover { color: var(--black); }

    @media (max-width: 540px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
      nav { padding: 1.5rem; }
      .hero { padding: 3.5rem 1.5rem 2.5rem; }
      .form-section { padding: 3rem 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="#">Shaun Bass</a>
    <a class="nav-link" href="#contact">Get in touch ↓</a>
  </nav>

  <section class="hero">
    <span class="eyebrow">Available for bookings</span>
    <h1>Let's make something worth hearing.</h1>
    <p>Whether it's a session, a show, or a conversation — reach out below and I'll get back to you personally.</p>
    <a class="btn" href="#contact">Contact me</a>
  </section>

  <section class="form-section" id="contact">
    <div class="form-inner">
      <h2>Send a message</h2>
      <p class="sub">Fill out the form and I'll be in touch soon.</p>
      <form action="mailto:sophism-bourbon.0b@icloud.com" method="get" enctype="text/plain">
        <div class="form-grid">
          <div>
            <label for="fname">First name</label>
            <input type="text" id="fname" name="First Name" placeholder="Jane" required />
          </div>
          <div>
            <label for="lname">Last name</label>
            <input type="text" id="lname" name="Last Name" placeholder="Smith" />
          </div>
          <div class="full">
            <label for="email">Email</label>
            <input type="email" id="email" name="Email" placeholder="jane@example.com" required />
          </div>
          <div class="full">
            <label for="type">Inquiry type</label>
            <select id="type" name="Inquiry Type">
              <option value="">Select one…</option>
              <option>Booking / performance</option>
              <option>Session work</option>
              <option>Collaboration</option>
              <option>General inquiry</option>
            </select>
          </div>
          <div class="full">
            <label for="msg">Message</label>
            <textarea id="msg" name="Message" placeholder="Tell me a bit about what you're looking for…"></textarea>
          </div>
        </div>
        <button type="submit" class="btn">Send message</button>
      </form>
    </div>
  </section>

  <footer>
    <span>© 2026 Shaun Bass</span>
    <span>shaunbass.com</span>
  </footer>

</body>
</html>
